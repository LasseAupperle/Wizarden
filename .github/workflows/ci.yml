name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck + lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test (incl. a small fuzz batch)
        run: pnpm test
        env:
          WIZARDEN_FUZZ_GAMES: 120
